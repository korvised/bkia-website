name: "bkia-website-uat"

services:
  redis:
    container_name: redis
    image: redis:6.2-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - app-network

  postgres:
    container_name: postgres
    image: postgres:16.2
    restart: always
    env_file:
      - ./data/env/postgres/.env
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - app-network

  server:
    container_name: server
    image: korvisedyotsaiy/bkia-website-server-uat:latest
    restart: always
    ports:
      - "8080"
    volumes:
      # LocalStorageService writes to process.cwd()/uploads = /app/uploads
      - ./data/uploads:/app/uploads
      # Backup dumps stored locally
      - ./data/backups:/app/backups
    env_file:
      - ./data/env/server/.env
    depends_on:
      - redis
      - postgres
    networks:
      - app-network

  admin:
    container_name: admin
    image: korvisedyotsaiy/bkia-website-admin-uat:latest
    restart: always
    expose:
      - "80"
    depends_on:
      - server
    networks:
      - app-network

  web:
    container_name: web
    image: korvisedyotsaiy/bkia-website-client-uat:latest
    restart: always
    env_file:
      - ./data/env/web/.env
    expose:
      - "3000"
    depends_on:
      - server
    networks:
      - app-network

  nginx:
    image: nginx:1.24-alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx-reverse-proxy-uat.conf:/etc/nginx/conf.d/default.conf:ro
      # Read-only mount of uploads so nginx can serve static files directly
      # without proxying through NestJS
      - ./data/uploads:/data/uploads:ro
    depends_on:
      - server
      - web
      - admin
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
