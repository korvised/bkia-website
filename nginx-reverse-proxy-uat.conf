# ----------------------------------------
# Upstreams (internal Docker services)
# ----------------------------------------

# NestJS API server
upstream api_upstream {
  server server:8080;
}

# Admin panel (Vite, served by nginx inside "admin" container)
upstream admin_upstream {
  server admin:80;
}

# Public website (Next.js client)
upstream web_upstream {
  server web:3000;
}

# ----------------------------------------
# Main HTTP server — UAT environment
# ----------------------------------------
server {
  listen 80;
  server_name _;

  # Allow larger request bodies (file uploads, cover image + gallery images @ 10 MB each)
  client_max_body_size 220m;

  # ----------------------------------------
  # /uploads/  → serve locally-stored files directly from disk
  #
  # Files are saved by LocalStorageService to /app/uploads/ inside the server
  # container, which maps to ./data/uploads/ on the host (and /data/uploads/
  # inside this nginx container via the read-only volume mount).
  #
  # Serving directly from nginx avoids proxying every image through NestJS.
  # ----------------------------------------
  location /uploads/ {
    alias /data/uploads/;

    # Basic security: no directory listing
    autoindex off;

    # Cache uploaded assets for 7 days in the browser
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";

    # Skip access log noise for static files
    access_log off;

    # Return 404 for missing files rather than falling through to other blocks
    try_files $uri =404;
  }

  # ----------------------------------------
  # /api/  → NestJS server
  # ----------------------------------------
  location /api/ {
    proxy_pass http://api_upstream;

    proxy_http_version 1.1;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
  }

  # ----------------------------------------
  # /admin/  → Admin panel (Vite)
  # ----------------------------------------
  location /admin/ {
    proxy_pass http://admin_upstream;

    proxy_http_version 1.1;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_set_header Upgrade            $http_upgrade;
    proxy_set_header Connection         "upgrade";

    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
  }

  # ----------------------------------------
  # /  → Public website (Next.js)
  # ----------------------------------------
  location / {
    proxy_pass http://web_upstream;

    proxy_http_version 1.1;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_set_header Upgrade            $http_upgrade;
    proxy_set_header Connection         "upgrade";

    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
  }
}
